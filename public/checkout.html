<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago seguro — Go Viaja Con Nosotros</title>
  <script src="https://checkout.bold.co/library/boldPaymentButton.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #05111f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px 16px;
    }
    .card {
      background: #0a1f35;
      border: 1px solid rgba(200,153,58,0.25);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo { width: 130px; margin-bottom: 14px; }
    h1 { font-size: 1rem; font-weight: 600; color: #c8993a; margin-bottom: 4px; }
    .amount { font-size: 1.8rem; font-weight: 700; color: #fff; margin: 8px 0 4px; }
    .ref { font-size: 0.7rem; color: rgba(255,255,255,0.3); margin-bottom: 24px; }
    #bold-btn-wrapper { display: flex; justify-content: center; }
    .back { margin-top: 18px; font-size: 0.78rem; color: rgba(255,255,255,0.35); }
    .back a { color: #c8993a; text-decoration: none; }
    .error {
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.3);
      border-radius: 10px;
      padding: 14px;
      font-size: 0.85rem;
      color: #fca5a5;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <img class="logo" src="/images/logo.png" alt="Go Viaja Con Nosotros" onerror="this.style.display='none'" />
  <h1>Pago seguro</h1>
  <div class="amount" id="amount-display">—</div>
  <div class="ref" id="ref-display"></div>

  <div id="bold-btn-wrapper"></div>
  <div class="error" id="error-box">Parámetros inválidos. <a href="javascript:history.back()" style="color:#c8993a">Volver</a></div>

  <p class="back"><a href="javascript:history.back()">← Volver</a></p>
</div>

<script>
(function () {
  var p = new URLSearchParams(window.location.search);
  var apiKey      = p.get("api_key");
  var orderId     = p.get("order_id");
  var amount      = p.get("amount");
  var currency    = p.get("currency") || "COP";
  var sig         = p.get("sig");
  var redirectUrl = p.get("redirect_url") || (window.location.origin + "/pago-exitoso");

  if (!apiKey || !orderId || !amount || !sig) {
    document.getElementById("error-box").style.display = "block";
    return;
  }

  document.getElementById("amount-display").textContent =
    "$" + parseInt(amount).toLocaleString("es-CO") + " COP";
  document.getElementById("ref-display").textContent = "Ref: " + orderId;

  // Crear el script-botón de Bold con todos los atributos
  var btn = document.createElement("script");
  btn.setAttribute("data-bold-button", "");
  btn.setAttribute("data-api-key", apiKey);
  btn.setAttribute("data-order-id", orderId);
  btn.setAttribute("data-amount", amount);
  btn.setAttribute("data-currency", currency);
  btn.setAttribute("data-integrity-signature", sig);
  btn.setAttribute("data-description", "Boleta Go Viaja Con Nosotros 2026");
  btn.setAttribute("data-redirection-url", redirectUrl);
  btn.setAttribute("data-render-mode", "embedded");

  document.getElementById("bold-btn-wrapper").appendChild(btn);
})();
</script>
</body>
</html>
